<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Language Translation Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 800px;
      color: white;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(to right, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle {
      text-align: center;
      color: rgba(255,255,255,0.5);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .lang-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .lang-row > div {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    select {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
    }
    select option { background: #1a1a2e; color: white; }
    .text-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .text-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    textarea {
      width: 100%;
      height: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 1rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    textarea::placeholder { color: rgba(255,255,255,0.3); }
    .box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .box-header span { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .icon-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }
    .translate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #e94560, #c62a47);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .translate-btn:hover { opacity: 0.9; }
    .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    .char-count { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Language Translator</h1>
    <p class="subtitle">Powered by Google Translate — CodeAlpha AI Internship</p>

    <div class="lang-row">
      <div>
        <label>Source Language</label>
        <select id="src-lang">
          <option value="auto">Auto Detect</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="zh-cn">Chinese (Simplified)</option>
          <option value="ar">Arabic</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ru">Russian</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="ur">Urdu</option>
          <option value="bn">Bengali</option>
          <option value="tr">Turkish</option>
        </select>
      </div>
      <div>
        <label>Target Language</label>
        <select id="dest-lang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="zh-cn">Chinese (Simplified)</option>
          <option value="ar">Arabic</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ru">Russian</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="ur">Urdu</option>
          <option value="bn">Bengali</option>
          <option value="tr">Turkish</option>
        </select>
      </div>
    </div>

    <div class="text-row">
      <div class="text-box">
        <div class="box-header">
          <span>Input Text</span>
          <button class="icon-btn" onclick="clearInput()">🗑 Clear</button>
        </div>
        <textarea id="input-text" placeholder="Enter text to translate..." oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span> characters</div>
      </div>
      <div class="text-box">
        <div class="box-header">
          <span>Translated Text</span>
          <div style="display:flex; gap:8px;">
            <button class="icon-btn" onclick="copyText()">📋 Copy</button>
            <button class="icon-btn" onclick="speakText()">🔊 Speak</button>
          </div>
        </div>
        <textarea id="output-text" placeholder="Translation will appear here..." readonly></textarea>
      </div>
    </div>

    <button class="translate-btn" onclick="translateText()" id="translate-btn">
      🔄 Translate
    </button>
    <div id="error-msg"></div>
  </div>

  <script>
    function updateCharCount() {
      const text = document.getElementById("input-text").value;
      document.getElementById("char-count").textContent = text.length;
    }

    function clearInput() {
      document.getElementById("input-text").value = "";
      document.getElementById("output-text").value = "";
      document.getElementById("char-count").textContent = "0";
      document.getElementById("error-msg").style.display = "none";
    }

    async function translateText() {
      const text = document.getElementById("input-text").value.trim();
      const src = document.getElementById("src-lang").value;
      const dest = document.getElementById("dest-lang").value;
      const btn = document.getElementById("translate-btn");
      const errMsg = document.getElementById("error-msg");

      errMsg.style.display = "none";

      if (!text) {
        errMsg.textContent = "⚠️ Please enter some text to translate.";
        errMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "⏳ Translating...";

      try {
        const res = await fetch("/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, src, dest })
        });
        const data = await res.json();
        if (data.error) {
          errMsg.textContent = "❌ " + data.error;
          errMsg.style.display = "block";
        } else {
          document.getElementById("output-text").value = data.translated;
        }
      } catch (e) {
        errMsg.textContent = "❌ Server error. Make sure Flask app is running.";
        errMsg.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "🔄 Translate";
    }

    function copyText() {
      const output = document.getElementById("output-text").value;
      if (!output) return;
      navigator.clipboard.writeText(output).then(() => alert("✅ Copied to clipboard!"));
    }

    function speakText() {
      const output = document.getElementById("output-text").value;
      const dest = document.getElementById("dest-lang").value;
      if (!output) return;
      const utter = new SpeechSynthesisUtterance(output);
      utter.lang = dest;
      window.speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
